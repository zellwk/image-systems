# Demonstrates asset caching from the Build Performance and Caching lesson.
# Restore the image cache before building, save it after — even if a later
# step fails.
name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Restore the image cache
      - name: Restore Astro image cache
        id: cache-astro-restore
        uses: actions/cache/restore@v5
        with:
          path: node_modules/.astro
          key: astro-images-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            astro-images-${{ runner.os }}-

      # Build the site
      - name: Build site
        run: npm run build

      # Save the image cache
      - name: Save Astro image cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: node_modules/.astro
          key: ${{ steps.cache-astro-restore.outputs.cache-primary-key }}
